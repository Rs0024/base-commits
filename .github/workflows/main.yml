name: Auto Commits

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Make 50 commits
        run: |
          git config user.email "riteshks2310@gmail.com"
          git config user.name "Rs0024"
          for i in $(seq 101 150); do
            echo "Day $i - Building on Base blockchain ecosystem" >> README.md
            git add README.md
            git commit -m "Day $i - Base builder progress update"
          done
          git push
